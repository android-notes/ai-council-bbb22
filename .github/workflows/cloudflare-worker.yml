name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after validation"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: cloudflare-worker
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Worker relay
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate frontend
        run: |
          npm run lint
          npm run build

      - name: Validate Worker bundle
        run: npx wrangler@4.105.0 deploy --dry-run

      - name: Deploy Worker
        if: ${{ inputs.deploy }}
        run: npx wrangler@4.105.0 deploy

      - name: Deployment summary
        if: ${{ inputs.deploy }}
        run: |
          {
            echo "## Cloudflare Worker deployed"
            echo ""
            echo "Worker name: \`ai-council-relay\`"
            echo ""
            echo "Use these Base URL patterns in AI Council:"
            echo ""
            echo "- \`https://<your-worker-subdomain>/openai/v1\`"
            echo "- \`https://<your-worker-subdomain>/deepseek\`"
            echo "- \`https://<your-worker-subdomain>/anthropic/v1\`"
            echo "- \`https://<your-worker-subdomain>/gemini/v1beta\`"
            echo "- \`https://<your-worker-subdomain>/openrouter/api/v1\`"
          } >> "$GITHUB_STEP_SUMMARY"
